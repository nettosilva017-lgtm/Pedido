<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#00a0e4" />
  <meta name="description" content="App de Vendas Ouxe Marketing" />
  <title>Ouxe Marketing - Vendas</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <style>
    :root {
      --azul-ouxe: #00a0e4;
      --azul-ouxe-dark: #007fba;
      --azul-ouxe-light: #e0f2ff;
      --verde: #16a34a;
      --verde-dark: #15803d;
      --vermelho: #dc2626;
      --vermelho-dark: #b91c1c;
      --fundo: #eef3f8;
      --card: #ffffff;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --radius: 18px;
      --radius-sm: 12px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--fundo); 
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif; 
      padding-bottom: 30px;
      color: var(--text-primary);
      line-height: 1.5;
    }
    
    .hidden { display: none !important; }
    
    /* Container responsivo */
    .app-shell { 
      width: 100%; 
      max-width: 560px; 
      margin: 0 auto; 
      padding: 0 12px;
    }
    
    /* Header com gradiente animado */
    .app-header {
      background: linear-gradient(135deg, var(--azul-ouxe) 0%, #0073cf 100%);
      color: white; 
      padding: 20px 15px; 
      border-radius: 0 0 28px 28px; 
      text-align: center;
      box-shadow: var(--shadow-lg);
      margin: 0 -12px 20px -12px;
      position: relative;
      overflow: hidden;
    }
    
    .app-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: shimmer 3s ease-in-out infinite;
    }
    
    @keyframes shimmer {
      0%, 100% { transform: translate(-10%, -10%); }
      50% { transform: translate(10%, 10%); }
    }

    .header-content {
      position: relative;
      z-index: 1;
    }

    .tag-mobile {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Navegação */
    .nav-wrap { 
      background: white; 
      border-radius: var(--radius); 
      padding: 6px; 
      margin-bottom: 16px; 
      box-shadow: var(--shadow-sm); 
    }
    
    .nav-pills .nav-link { 
      border-radius: 12px; 
      padding: 12px 16px; 
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    
    .nav-pills .nav-link:hover {
      background: var(--azul-ouxe-light);
      color: var(--azul-ouxe);
    }
    
    .nav-pills .nav-link.active { 
      background: linear-gradient(135deg, var(--azul-ouxe), var(--azul-ouxe-dark));
      color: white;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(0, 160, 228, 0.3);
    }

    /* Cards de seção */
    .section-card { 
      background: var(--card); 
      border-radius: var(--radius); 
      padding: 18px; 
      margin-bottom: 16px; 
      box-shadow: var(--shadow-md);
      transition: var(--transition);
    }
    
    .section-card:hover {
      box-shadow: var(--shadow-lg);
    }
    
    .section-card h6 {
      color: var(--text-primary);
      font-weight: 700;
      margin-bottom: 12px;
    }

    /* Labels */
    .form-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    /* Inputs e Selects */
    .form-control, .form-select {
      border-radius: var(--radius-sm);
      border: 2px solid #e2e8f0;
      padding: 12px 14px;
      font-size: 0.95rem;
      transition: var(--transition);
    }
    
    .form-control:focus, .form-select:focus {
      border-color: var(--azul-ouxe);
      box-shadow: 0 0 0 4px rgba(0, 160, 228, 0.15);
      outline: none;
    }

    /* Input group mobile */
    .input-group-mobile {
      display: flex;
      flex-direction: row;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .input-group-mobile select { flex: 1; min-width: 0; }
    .input-group-mobile input { width: 80px; flex-shrink: 0; }
    
    .input-group-mobile .btn {
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    
    .input-group-mobile .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 160, 228, 0.3);
    }

    /* Action box */
    .action-box {
      background: linear-gradient(135deg, #f8fbff 0%, #f0f7ff 100%); 
      border: 2px solid #dbeafe; 
      border-radius: 20px; 
      padding: 18px; 
      transition: var(--transition);
    }
    
    .action-box:hover {
      border-color: var(--azul-ouxe);
    }

    /* Botões */
    .btn-send {
      height: 56px; 
      border-radius: 14px; 
      border: none; 
      font-weight: 800;
      font-size: 1rem;
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 12px;
      color: white; 
      width: 100%; 
      text-decoration: none;
      transition: var(--transition);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }
    
    .btn-send:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
    }
    
    .btn-send:active {
      transform: translateY(0);
    }
    
    .btn-share { 
      background: linear-gradient(135deg, #6366f1, #4f46e5); 
    }
    
    .btn-primary-custom {
      background: linear-gradient(135deg, var(--azul-ouxe), var(--azul-ouxe-dark));
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    
    .btn-primary-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 160, 228, 0.3);
      color: white;
    }
    
    .btn-dark-custom {
      background: linear-gradient(135deg, #334155, #1e293b);
      border: none;
      color: white;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
    }
    
    .btn-dark-custom:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(51, 65, 85, 0.3);
      color: white;
    }

    /* Lista de itens */
    .item-lista { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      padding: 12px 0; 
      border-bottom: 1px solid #f1f5f9; 
      font-size: 0.9rem;
      transition: var(--transition);
    }
    
    .item-lista:last-child {
      border-bottom: none;
    }
    
    .item-lista:hover {
      background: #f8fafc;
      padding-left: 8px;
      padding-right: 8px;
      margin: 0 -8px;
      border-radius: 8px;
    }
    
    .icon-trash { 
      color: var(--vermelho); 
      cursor: pointer; 
      font-size: 1.2rem; 
      padding: 8px;
      border-radius: 8px;
      transition: var(--transition);
    }
    
    .icon-trash:hover {
      background: #fef2f2;
      transform: scale(1.1);
    }
    
    .icon-edit { 
      color: var(--azul-ouxe); 
      cursor: pointer; 
      font-size: 1.2rem; 
      margin-right: 8px; 
      padding: 8px;
      border-radius: 8px;
      transition: var(--transition);
    }
    
    .icon-edit:hover {
      background: var(--azul-ouxe-light);
      transform: scale(1.1);
    }

    /* Carrinho */
    #carrinho-lista {
      max-height: 280px;
      overflow-y: auto;
      border-radius: var(--radius-sm);
      background: #fafafa;
      padding: 12px;
    }
    
    #carrinho-lista::-webkit-scrollbar {
      width: 6px;
    }
    
    #carrinho-lista::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 3px;
    }
    
    #carrinho-lista::-webkit-scrollbar-thumb {
      background: var(--azul-ouxe);
      border-radius: 3px;
    }
    
    .carrinho-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #e2e8f0;
      animation: slideIn 0.3s ease;
    }
    
    .carrinho-item:last-child {
      border-bottom: none;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Total */
    .total-venda {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--verde);
      text-align: right;
      padding: 12px;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border-radius: var(--radius-sm);
      margin-top: 12px;
    }

    /* Espelho para captura */
    #espelho-pedido {
      width: 700px; 
      background: white; 
      position: absolute; 
      left: -9999px; 
      top: 0; 
      padding: 40px;
    }
    
    .img-table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 20px; 
    }
    
    .img-table th { 
      background: linear-gradient(135deg, var(--azul-ouxe), var(--azul-ouxe-dark));
      color: white;
      border: 1px solid #ddd; 
      padding: 14px; 
      text-align: left; 
      font-weight: 600;
    }
    
    .img-table td { 
      border: 1px solid #ddd; 
      padding: 12px; 
    }
    
    .img-table tr:nth-child(even) {
      background: #f8fbff;
    }

    /* Botão limpar carrinho */
    .btn-limpar {
      color: var(--vermelho);
      background: none;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .btn-limpar:hover {
      color: var(--vermelho-dark);
      text-decoration: underline;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 30px;
      color: var(--text-secondary);
    }
    
    .empty-state i {
      font-size: 3rem;
      color: #cbd5e1;
      margin-bottom: 12px;
    }

    /* Toast notification */
    .toast-notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      color: white;
      padding: 14px 24px;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      z-index: 9999;
      opacity: 0;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .toast-notification.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* MEDIA QUERIES - Responsividade */
    
    /* Tablets e telas médias */
    @media (min-width: 576px) {
      .app-shell {
        padding: 0 20px;
      }
      
      .app-header {
        padding: 24px 20px;
        margin: 0 -20px 24px -20px;
        border-radius: 0 0 32px 32px;
      }
      
      .section-card {
        padding: 24px;
      }
      
      .input-group-mobile {
        gap: 12px;
      }
      
      .input-group-mobile input {
        width: 90px;
      }
    }

    /* Desktop */
    @media (min-width: 768px) {
      .app-shell {
        max-width: 640px;
        padding: 0 24px;
      }
      
      .app-header {
        padding: 28px 24px;
        margin: 0 -24px 28px -24px;
      }
      
      .nav-pills .nav-link {
        padding: 14px 24px;
        font-size: 1rem;
      }
      
      .section-card {
        padding: 28px;
      }
    }

    /* Telas pequenas */
    @media (max-width: 380px) {
      .app-shell {
        padding: 0 8px;
      }
      
      .app-header {
        padding: 16px 12px;
        margin: 0 -8px 16px -8px;
      }
      
      .app-header h1 {
        font-size: 1.2rem;
      }
      
      .tag-mobile {
        font-size: 0.55rem;
        padding: 3px 6px;
      }
      
      .nav-pills .nav-link {
        padding: 10px 8px;
        font-size: 0.8rem;
      }
      
      .section-card {
        padding: 14px;
      }
      
      .input-group-mobile {
        flex-wrap: wrap;
      }
      
      .input-group-mobile select {
        flex-basis: 100%;
      }
      
      .input-group-mobile input,
      .input-group-mobile .btn {
        flex-basis: calc(50% - 4px);
      }
      
      .btn-send {
        height: 52px;
        font-size: 0.9rem;
      }
      
      .total-venda {
        font-size: 1.25rem;
      }
    }

    /* Landscape mode em mobile */
    @media (max-height: 500px) and (orientation: landscape) {
      .app-header {
        padding: 12px;
        margin-bottom: 12px;
      }
      
      .section-card {
        padding: 12px;
        margin-bottom: 12px;
      }
      
      #carrinho-lista {
        max-height: 150px;
      }
    }

    /* Modo escuro (opcional) */
    @media (prefers-color-scheme: dark) {
      :root {
        --fundo: #0f172a;
        --card: #1e293b;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
      }
      
      .form-control, .form-select {
        background: #334155;
        border-color: #475569;
        color: #f1f5f9;
      }
      
      .section-card, .nav-wrap {
        background: #1e293b;
      }
      
      .action-box {
        background: #1e293b;
        border-color: #334155;
      }
      
      #carrinho-lista {
        background: #0f172a;
      }
      
      .carrinho-item {
        border-bottom-color: #334155;
      }
    }

    /* Print styles */
    @media print {
      body * {
        visibility: hidden;
      }
      #espelho-pedido, #espelho-pedido * {
        visibility: visible;
      }
      #espelho-pedido {
        position: absolute;
        left: 0;
        top: 0;
      }
    }
  </style>
</head>
<body>

  <!-- Espelho para geração de imagem -->
  <div id="espelho-pedido" aria-hidden="true">
    <div style="text-align:center; border-bottom:2px solid #00a0e4; padding-bottom:20px;">
      <h1 style="color:#0073cf; margin:0; font-size:38px;">Ouxe Marketing</h1>
      <p style="color:#666; font-size:18px;">Espelho de Pedido de Venda</p>
    </div>
    <div style="display:flex; justify-content:space-between; margin-top:20px; font-size:18px;">
      <div>
        <b>Cliente:</b> <span id="img-cliente"></span>
        <br>
        <b>Cidade:</b> Feira de Santana
      </div>
      <div style="text-align:right">
        <b>Data:</b> <span id="img-data"></span>
        <br>
        <b>Rep:</b> Vendedor
      </div>
    </div>
    <table class="img-table">
      <thead>
        <tr>
          <th>Qtd</th>
          <th>Produto</th>
          <th>Unit.</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="img-corpo"></tbody>
      <tfoot>
        <tr style="font-weight:bold; font-size:24px; background:#f8fbff;">
          <td colspan="3" style="text-align:right">TOTAL DO PEDIDO</td>
          <td id="img-total" style="color:#0073cf"></td>
        </tr>
      </tfoot>
    </table>
    <div style="text-align:center; margin-top:25px; padding-top:20px; border-top:1px dashed #ccc;">
      <a href="https://nettosilva017-lgtm.github.io/Amazonas/" target="_blank" style="color:#15803d; text-decoration:none; font-weight:bold; font-size:20px;">
        <i class="bi bi-cart-check-fill"></i> Compre online
      </a>
    </div>
  </div>

  <!-- App principal -->
  <div class="app-shell">
    <header class="app-header">
      <div class="header-content d-flex align-items-center justify-content-center gap-2 mb-1">
        <i class="bi bi-cart4 fs-3"></i>
        <h1 class="h4 fw-bold m-0 text-uppercase">Ouxe Marketing</h1>
        <span class="tag-mobile">App</span>
      </div>
      <small style="position: relative; z-index: 1;">Feira de Santana - Bahia</small>
    </header>

    <main>
      <!-- Navegação -->
      <div class="nav-wrap">
        <ul class="nav nav-pills nav-fill" role="tablist">
          <li class="nav-item" role="presentation">
            <button id="tab-v-btn" class="nav-link active" onclick="showTab('vendas')" role="tab" aria-selected="true">
              <i class="bi bi-bag me-1"></i>Vendas
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button id="tab-c-btn" class="nav-link" onclick="showTab('cadastro')" role="tab" aria-selected="false">
              <i class="bi bi-person-plus me-1"></i>Cadastro
            </button>
          </li>
        </ul>
      </div>

      <!-- Tab Vendas -->
      <section id="tab-vendas" role="tabpanel">
        <div class="section-card">
          <label for="venda-cliente" class="form-label">Cliente</label>
          <select id="venda-cliente" class="form-select mb-3 text-uppercase" aria-label="Selecionar cliente"></select>

          <label for="venda-produto" class="form-label">Produto</label>
          <div class="input-group-mobile">
            <select id="venda-produto" class="form-select" aria-label="Selecionar produto"></select>
            <input type="number" id="venda-qtd" class="form-control" value="1" min="1" max="999" inputmode="numeric" aria-label="Quantidade">
            <button class="btn btn-primary-custom" onclick="addCarrinho()" aria-label="Adicionar ao carrinho">
              <i class="bi bi-plus-lg"></i>
            </button>
          </div>

          <div id="carrinho-lista" role="list" aria-label="Itens do carrinho">
            <div class="empty-state">
              <i class="bi bi-cart3"></i>
              <p class="mb-0">Carrinho vazio</p>
              <small>Adicione produtos para começar</small>
            </div>
          </div>
          
          <div class="total-venda" id="total-venda" aria-live="polite">R$ 0,00</div>
        </div>

        <div class="action-box">
          <button onclick="gerarImagem()" class="btn-send btn-share mb-2" aria-label="Compartilhar pedido">
            <i class="bi bi-camera-fill"></i>
            <span>COMPARTILHAR PEDIDO</span>
          </button>
          <button onclick="limparCarrinho()" class="btn-limpar w-100" aria-label="Limpar carrinho">
            <i class="bi bi-trash me-1"></i>Limpar Carrinho
          </button>
        </div>
      </section>

      <!-- Tab Cadastro -->
      <section id="tab-cadastro" class="hidden" role="tabpanel">
        <div class="section-card">
          <h6 class="fw-bold border-bottom pb-3 mb-3">
            <i class="bi bi-plus-circle me-2"></i>Novo Item
          </h6>
          <label for="cad-nome" class="form-label">Nome</label>
          <input type="text" id="cad-nome" class="form-control mb-3" placeholder="Nome do cliente ou produto" autocomplete="off">
          
          <label for="cad-preco" class="form-label">Preço (apenas para produtos)</label>
          <input type="number" id="cad-preco" class="form-control mb-3" placeholder="R$ 0,00" inputmode="decimal" step="0.01">
          
          <div class="d-flex gap-2">
            <button onclick="salvar('cliente')" class="btn btn-primary-custom w-100">
              <i class="bi bi-person-plus me-2"></i>Cliente
            </button>
            <button onclick="salvar('produto')" class="btn btn-dark-custom w-100">
              <i class="bi bi-box me-2"></i>Produto
            </button>
          </div>
        </div>
        
        <div class="section-card">
          <h6 class="fw-bold border-bottom pb-3 mb-3">
            <i class="bi bi-people me-2"></i>Clientes
          </h6>
          <div id="lista-clientes-cad" role="list"></div>
        </div>

        <div class="section-card">
          <h6 class="fw-bold border-bottom pb-3 mb-3">
            <i class="bi bi-box-seam me-2"></i>Produtos
          </h6>
          <div id="lista-produtos-cad" role="list"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast-notification" role="alert" aria-live="assertive">
    <i class="bi bi-check-circle-fill" style="color: #4ade80;"></i>
    <span id="toast-message"></span>
  </div>

  <script>
    // Dados
    let clientes = JSON.parse(localStorage.getItem('ouxe_clientes')) || ["Edimundo Netto", "Vanilde"];
    let produtos = JSON.parse(localStorage.getItem('ouxe_produtos')) || [];
    let carrinho = [];

    // Utilitários
    function formatar(v) { 
      return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); 
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-message').textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function showTab(t) {
      const tabVendas = document.getElementById('tab-vendas');
      const tabCadastro = document.getElementById('tab-cadastro');
      const btnV = document.getElementById('tab-v-btn');
      const btnC = document.getElementById('tab-c-btn');
      
      if (t === 'vendas') {
        tabVendas.classList.remove('hidden');
        tabCadastro.classList.add('hidden');
        btnV.classList.add('active');
        btnV.setAttribute('aria-selected', 'true');
        btnC.classList.remove('active');
        btnC.setAttribute('aria-selected', 'false');
      } else {
        tabVendas.classList.add('hidden');
        tabCadastro.classList.remove('hidden');
        btnV.classList.remove('active');
        btnV.setAttribute('aria-selected', 'false');
        btnC.classList.add('active');
        btnC.setAttribute('aria-selected', 'true');
        renderListas();
      }
    }

    function renderListas() {
      // Select de clientes
      const clienteSelect = document.getElementById('venda-cliente');
      clienteSelect.innerHTML = clientes.length > 0 
        ? clientes.map(c => `<option>${c.toUpperCase()}</option>`).join('')
        : '<option value="">Nenhum cliente</option>';
      
      // Select de produtos
      const produtoSelect = document.getElementById('venda-produto');
      produtoSelect.innerHTML = produtos.length > 0
        ? produtos.map((p, i) => `<option value="${i}">${p.nome.toUpperCase()} - ${formatar(p.preco)}</option>`).join('')
        : '<option value="">Nenhum produto</option>';
      
      // Lista de clientes
      const listaClientes = document.getElementById('lista-clientes-cad');
      listaClientes.innerHTML = clientes.length > 0
        ? clientes.map((c, i) => `
            <div class="item-lista" role="listitem">
              <span class="text-uppercase">${c}</span>
              <i class="bi bi-trash icon-trash" onclick="apagar('cliente', ${i})" aria-label="Excluir ${c}"></i>
            </div>`).join('')
        : '<div class="empty-state"><small>Nenhum cliente cadastrado</small></div>';

      // Lista de produtos
      const listaProdutos = document.getElementById('lista-produtos-cad');
      listaProdutos.innerHTML = produtos.length > 0
        ? produtos.map((p, i) => `
            <div class="item-lista" role="listitem">
              <div>
                <b class="text-uppercase">${p.nome}</b>
                <br>
                <span class="text-success fw-bold">${formatar(p.preco)}</span>
              </div>
              <div>
                <i class="bi bi-pencil-square icon-edit" onclick="editarPreco(${i})" aria-label="Editar preço"></i>
                <i class="bi bi-trash icon-trash" onclick="apagar('produto', ${i})" aria-label="Excluir ${p.nome}"></i>
              </div>
            </div>`).join('')
        : '<div class="empty-state"><small>Nenhum produto cadastrado</small></div>';
    }

    function addCarrinho() {
      const produtoSelect = document.getElementById('venda-produto');
      const qtdInput = document.getElementById('venda-qtd');
      
      const i = produtoSelect.value;
      const q = parseInt(qtdInput.value) || 1;
      
      if (i === "" || !produtos[i]) {
        showToast('Selecione um produto válido');
        return;
      }
      
      if (q < 1 || q > 999) {
        showToast('Quantidade deve ser entre 1 e 999');
        return;
      }
      
      carrinho.push({ ...produtos[i], qtd: q });
      renderCarrinho();
      showToast('Produto adicionado!');
      qtdInput.value = '1';
    }

    function renderCarrinho() {
      const carrinhoLista = document.getElementById('carrinho-lista');
      
      if (carrinho.length === 0) {
        carrinhoLista.innerHTML = `
          <div class="empty-state">
            <i class="bi bi-cart3"></i>
            <p class="mb-0">Carrinho vazio</p>
            <small>Adicione produtos para começar</small>
          </div>`;
        document.getElementById('total-venda').innerText = formatar(0);
        return;
      }
      
      let total = 0;
      carrinhoLista.innerHTML = carrinho.map((it, idx) => {
        total += it.preco * it.qtd;
        return `
          <div class="carrinho-item" role="listitem">
            <div>
              <strong>${it.qtd}x</strong>
              <span class="ms-2 text-uppercase">${it.nome}</span>
            </div>
            <div class="d-flex align-items-center">
              <strong class="text-success me-2">${formatar(it.preco * it.qtd)}</strong>
              <i class="bi bi-x-circle-fill text-danger" 
                 style="cursor:pointer; font-size:1.3rem;" 
                 onclick="removerDoCarrinho(${idx})"
                 aria-label="Remover ${it.nome}"></i>
            </div>
          </div>`;
      }).join('');
      
      document.getElementById('total-venda').innerText = formatar(total);
    }

    function removerDoCarrinho(idx) { 
      carrinho.splice(idx, 1); 
      renderCarrinho(); 
    }
    
    function limparCarrinho() { 
      if (carrinho.length === 0) return;
      if (confirm('Deseja limpar todo o carrinho?')) {
        carrinho = []; 
        renderCarrinho();
        showToast('Carrinho limpo!');
      }
    }

    async function gerarImagem() {
      if (!carrinho.length) {
        showToast('Adicione produtos ao carrinho!');
        return;
      }
      
      const btn = document.querySelector('.btn-send');
      const originalContent = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Gerando...';
      btn.disabled = true;
      
      try {
        document.getElementById('img-cliente').innerText = document.getElementById('venda-cliente').value;
        document.getElementById('img-data').innerText = new Date().toLocaleDateString('pt-BR');
        document.getElementById('img-total').innerText = document.getElementById('total-venda').innerText;
        
        document.getElementById('img-corpo').innerHTML = carrinho.map(it => `
          <tr>
            <td>${it.qtd}</td>
            <td style="text-transform:uppercase">${it.nome}</td>
            <td>${formatar(it.preco)}</td>
            <td>${formatar(it.preco * it.qtd)}</td>
          </tr>`).join('');

        const canvas = await html2canvas(document.getElementById('espelho-pedido'), { 
          scale: 2,
          useCORS: true,
          logging: false
        });
        
        canvas.toBlob(async (blob) => {
          const file = new File([blob], 'pedido-ouxe.png', { type: 'image/png' });
          
          if (navigator.share && navigator.canShare({ files: [file] })) {
            try { 
              await navigator.share({ 
                files: [file], 
                title: 'Pedido Ouxe Marketing',
                text: 'Confira o pedido!'
              });
              showToast('Compartilhado com sucesso!');
            } catch(e) {
              if (e.name !== 'AbortError') {
                downloadImagem(blob);
              }
            }
          } else {
            downloadImagem(blob);
          }
          
          btn.innerHTML = originalContent;
          btn.disabled = false;
        });
      } catch (error) {
        console.error('Erro ao gerar imagem:', error);
        showToast('Erro ao gerar imagem');
        btn.innerHTML = originalContent;
        btn.disabled = false;
      }
    }
    
    function downloadImagem(blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); 
      a.href = url; 
      a.download = `pedido-ouxe-${Date.now()}.png`; 
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Imagem baixada!');
    }

    function salvar(tipo) {
      const nomeInput = document.getElementById('cad-nome');
      const precoInput = document.getElementById('cad-preco');
      
      const nome = nomeInput.value.trim();
      const preco = parseFloat(precoInput.value);
      
      if (!nome) {
        showToast('Digite um nome!');
        nomeInput.focus();
        return;
      }
      
      if (tipo === 'cliente') { 
        if (clientes.some(c => c.toLowerCase() === nome.toLowerCase())) {
          showToast('Cliente já cadastrado!');
          return;
        }
        clientes.push(nome); 
        localStorage.setItem('ouxe_clientes', JSON.stringify(clientes));
        showToast('Cliente cadastrado!');
      } else { 
        if (isNaN(preco) || preco <= 0) {
          showToast('Digite um preço válido!');
          precoInput.focus();
          return;
        }
        if (produtos.some(p => p.nome.toLowerCase() === nome.toLowerCase())) {
          showToast('Produto já cadastrado!');
          return;
        }
        produtos.push({ nome, preco }); 
        localStorage.setItem('ouxe_produtos', JSON.stringify(produtos));
        showToast('Produto cadastrado!');
      }
      
      nomeInput.value = ""; 
      precoInput.value = "";
      renderListas();
    }
    
    function apagar(tipo, i) {
      const confirmMsg = tipo === 'cliente' ? 'Excluir este cliente?' : 'Excluir este produto?';
      if (confirm(confirmMsg)) {
        if (tipo === 'cliente') { 
          clientes.splice(i, 1); 
          localStorage.setItem('ouxe_clientes', JSON.stringify(clientes)); 
          showToast('Cliente excluído!');
        } else { 
          produtos.splice(i, 1); 
          localStorage.setItem('ouxe_produtos', JSON.stringify(produtos)); 
          showToast('Produto excluído!');
        }
        renderListas();
      }
    }

    function editarPreco(i) {
      const produto = produtos[i];
      const novo = prompt(`Novo preço para "${produto.nome}":`, produto.preco.toFixed(2));
      if (novo !== null) {
        const valor = parseFloat(novo.replace(',', '.'));
        if (!isNaN(valor) && valor > 0) {
          produtos[i].preco = valor;
          localStorage.setItem('ouxe_produtos', JSON.stringify(produtos));
          renderListas();
          showToast('Preço atualizado!');
        } else {
          showToast('Preço inválido!');
        }
      }
    }

    // Inicialização
    document.addEventListener('DOMContentLoaded', () => {
      renderListas();
      renderCarrinho();
    });
  </script>
</body>
</html>
