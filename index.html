<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ouxe Distribuidor — Pedido Eletrônico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --primary:#0b63d8;
      --muted:#6b7280;
      --card:#fff;
      --bg:#f3f6fb;
      --radius:12px;
    }
    body{background:var(--bg);font-family:Inter, system-ui, sans-serif;padding:20px;}
    .app{max-width:900px;margin:0 auto;}
    .header{display:flex;gap:20px;align-items:center;background:linear-gradient(90deg,#fff 0%, #f7fbff 100%);padding:18px;border-radius:16px;box-shadow:0 6px 18px rgba(10,20,40,0.06);}
    .logo{width:92px;height:92px;flex:0 0 92px;border-radius:12px;overflow:hidden;background:#fff;padding:6px;display:flex;align-items:center;justify-content:center}
    .logo img{max-width:100%;height:auto;display:block}
    .title{flex:1}
    .title h1{margin:0;color:var(--primary);font-weight:800;letter-spacing:1px}
    .title p{margin:0;color:var(--muted);font-size:0.9rem}
    .nav{margin-top:18px;display:flex;gap:8px}
    .card{background:var(--card);border-radius:12px;padding:14px;box-shadow:0 6px 18px rgba(10,20,40,0.04)}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .product-row{display:grid;grid-template-columns: 1fr 80px 110px 80px 40px;gap:8px;align-items:center}
    .product-row input, .product-row select{height:44px;padding:6px;border-radius:8px;border:1px solid #e6eef8}
    .table-border{border:1px solid #e3eefc;border-radius:8px;overflow:hidden}
    .pedido-canvas{background:#fff;padding:20px;border-radius:10px}
    .total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:linear-gradient(90deg,#f5f9ff,#eef6ff);border-radius:8px;margin-top:8px}
    .btn-share{background:#10b981;color:#fff}
    .small-muted{font-size:0.85rem;color:var(--muted)}
    /* Estilo para os botões de ação modernos */
    .btn-action {width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold;}
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo"><img src="ouxe-logo.png" alt="Logomarca"></div>
      <div class="title">
        <h1>OUXE DISTRIBUIDOR</h1>
        <p>Espelho de Pedido de Venda</p>
        <div class="small-muted">Sistema de Gestão de Pedidos Online</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div><button id="bt-p" class="btn btn-primary btn-sm">Pedido</button></div>
        <div><button id="bt-cad" class="btn btn-outline-secondary btn-sm">Cadastro</button></div>
      </div>
    </div>

    <div style="height:16px"></div>

    <!-- Pedido -->
    <div id="view-pedido" class="card">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Cliente</label>
          <select id="sel-cliente" class="form-select"></select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Frete (R$)</label>
          <input id="inp-frete" type="number" class="form-control" step="0.01" value="0">
        </div>
        <div class="col-md-3 text-end">
          <label class="form-label">Data</label>
          <div id="lbl-data" class="form-control-plaintext small-muted" style="padding-top:0.6rem"></div>
        </div>
      </div>

      <hr style="margin:14px 0">

      <div>
        <div class="product-row mb-2 fw-bold small-muted" style="background:#fbfdff;padding:8px;border-radius:8px">
          <div>Produto</div><div>Qtd</div><div>Preço Unit.</div><div>Total</div><div></div>
        </div>

        <div id="prod-list"></div>

        <div style="display:flex;gap:8px;margin-top:10px">
          <select id="sel-prod-add" class="form-select"></select>
          <input id="add-qtd" type="number" min="1" value="1" class="form-control" style="max-width:100px">
          <input id="add-preco" type="number" step="0.01" class="form-control" placeholder="Preço" style="max-width:140px">
          <button id="btn-add-prod" class="btn btn-primary">Adicionar</button>
        </div>

        <div class="total-row">
          <div class="small-muted">Itens: <span id="count-items">0</span></div>
          <div style="text-align:right">
            <div class="small-muted">Subtotal: <strong id="subtotal">R$ 0,00</strong></div>
            <div class="small-muted">Frete: <strong id="show-frete">R$ 0,00</strong></div>
            <div style="font-size:1.2rem;font-weight:800;color:#0b63d8">Total: <span id="total-geral">R$ 0,00</span></div>
          </div>
        </div>

        <div style="display:flex;gap:8px;margin-top:12px">
          <button id="btn-gerar-img" class="btn btn-outline-primary">Gerar Imagem do Pedido</button>
          <button id="btn-compartilhar" class="btn btn-share">Compartilhar / Baixar</button>
          <button id="btn-limpar" class="btn btn-danger">Limpar Pedido</button>
        </div>

        <div style="margin-top:14px">
          <div id="pedido-preview" class="pedido-canvas table-border" style="display:none"></div>
        </div>
      </div>
    </div>

    <!-- Cadastro -->
    <div id="view-cadastro" class="card" style="margin-top:14px;display:none">
      <div class="row g-3">
        <div class="col-md-6">
          <h5>Clientes</h5>
          <div class="input-group mb-2">
            <input id="inp-cliente" type="text" class="form-control" placeholder="Nome do cliente">
            <button id="btn-salvar-cliente" class="btn btn-outline-primary">Salvar</button>
          </div>
          <div id="list-clientes" class="list-group"></div>
        </div>

        <div class="col-md-6">
          <h5>Produtos</h5>
          <div class="input-group mb-2">
            <input id="inp-produto-nome" type="text" class="form-control" placeholder="Nome do produto">
            <input id="inp-produto-preco" type="number" step="0.01" class="form-control" placeholder="Preço (R$)" style="max-width:140px">
            <button id="btn-salvar-produto" class="btn btn-outline-primary">Salvar</button>
          </div>
          <div id="list-produtos" class="list-group"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const LS_CLIENTES = 'ouxe_clientes_v2';
    const LS_PRODUTOS = 'ouxe_produtos_v2';

    let clientes = JSON.parse(localStorage.getItem(LS_CLIENTES)) || ['Vanilde','Bruno','Edimundo'];
    let produtos = JSON.parse(localStorage.getItem(LS_PRODUTOS)) || [
      {nome:'Enxofre em pó 100g', preco:12.00},
      {nome:'Enxofre em pó 30g', preco:4.53},
      {nome:'Jalapa 30 ml', preco:2.65}
    ];

    let pedido = {cliente: clientes[0] || '', itens: [], frete:0, data: new Date().toLocaleDateString('pt-BR')};

    const fmt = v => v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

    const selCliente = document.getElementById('sel-cliente');
    const selProdAdd = document.getElementById('sel-prod-add');
    const prodList = document.getElementById('prod-list');
    const subtotalEl = document.getElementById('subtotal');
    const totalGeralEl = document.getElementById('total-geral');
    const countItemsEl = document.getElementById('count-items');
    const showFrete = document.getElementById('show-frete');
    const inpFrete = document.getElementById('inp-frete');
    const lblData = document.getElementById('lbl-data');
    const pedidoPreview = document.getElementById('pedido-preview');

    function syncStorage() {
      localStorage.setItem(LS_CLIENTES, JSON.stringify(clientes));
      localStorage.setItem(LS_PRODUTOS, JSON.stringify(produtos));
    }

    function renderCadastro() {
      const listClientes = document.getElementById('list-clientes');
      listClientes.innerHTML = clientes.map((c,i)=>`
        <div class="list-group-item d-flex justify-content-between align-items-center">
          <div>${c}</div>
          <div>
            <button class="btn btn-action btn-outline-danger" title="Excluir" onclick="delCliente(${i})">✕</button>
          </div>
        </div>
      `).join('') || '<div class="small text-muted">Sem clientes</div>';

      const listProdutos = document.getElementById('list-produtos');
      listProdutos.innerHTML = produtos.map((p,i)=>`
        <div class="list-group-item d-flex justify-content-between align-items-center">
          <div><strong>${p.nome}</strong><div class="small-muted">${fmt(p.preco)}</div></div>
          <div class="d-flex gap-2">
            <button class="btn btn-action btn-outline-warning" title="Editar" onclick="editProduto(${i})">✎</button>
            <button class="btn btn-action btn-outline-danger" title="Excluir" onclick="delProduto(${i})">✕</button>
          </div>
        </div>
      `).join('') || '<div class="small text-muted">Sem produtos</div>';

      selCliente.innerHTML = clientes.map(c=>`<option value="${c}">${c}</option>`).join('');
      selProdAdd.innerHTML = produtos.map((p,i)=>`<option value="${i}">${p.nome} — ${fmt(p.preco)}</option>`).join('');
    }

    function renderPedido() {
      lblData.innerText = pedido.data;
      inpFrete.value = pedido.frete || 0;
      showFrete.innerText = fmt(pedido.frete || 0);

      prodList.innerHTML = pedido.itens.length ? pedido.itens.map((it, idx)=>`
        <div class="product-row mb-1">
          <div><div style="font-weight:700">${it.nome}</div><div class="small-muted">${fmt(it.preco)}</div></div>
          <div><input type="number" min="1" value="${it.q}" onchange="updateQtd(${idx},this.value)" class="form-control"></div>
          <div><input type="number" step="0.01" value="${it.preco.toFixed(2)}" onchange="updatePreco(${idx},this.value)" class="form-control"></div>
          <div style="font-weight:700">${fmt(it.preco * it.q)}</div>
          <div><button class="btn btn-action btn-outline-danger" onclick="remItem(${idx})">✕</button></div>
        </div>
      `).join('') : '<div class="small-muted p-3">Nenhum item adicionado</div>';

      const subtotal = pedido.itens.reduce((s,i)=> s + (i.preco * i.q), 0);
      subtotalEl.innerText = fmt(subtotal);
      const total = subtotal + (Number(pedido.frete) || 0);
      totalGeralEl.innerText = fmt(total);
      countItemsEl.innerText = pedido.itens.length;
    }

    document.getElementById('btn-salvar-cliente').addEventListener('click', () => {
      const v = document.getElementById('inp-cliente').value.trim();
      if(!v) return alert('Informe o nome');
      clientes.push(v);
      document.getElementById('inp-cliente').value = '';
      syncStorage(); renderCadastro(); alert('Cliente salvo');
    });

    document.getElementById('btn-salvar-produto').addEventListener('click', () => {
      const nome = document.getElementById('inp-produto-nome').value.trim();
      const preco = parseFloat(document.getElementById('inp-produto-preco').value);
      if(!nome || isNaN(preco)) return alert('Informe nome e preço válidos');
      produtos.push({nome, preco});
      document.getElementById('inp-produto-nome').value = '';
      document.getElementById('inp-produto-preco').value = '';
      syncStorage(); renderCadastro(); alert('Produto salvo');
    });

    window.delCliente = function(i){
      if(!confirm('Excluir cliente?')) return;
      clientes.splice(i,1);
      syncStorage(); renderCadastro();
    }
    window.delProduto = function(i){
      if(!confirm('Excluir produto?')) return;
      produtos.splice(i,1);
      syncStorage(); renderCadastro();
    }

    window.editProduto = function(i){
      const novo = prompt('Novo nome e preço (separe por | )', `${produtos[i].nome}|${produtos[i].preco}`);
      if(!novo) return;
      const [n, p] = novo.split('|').map(s=>s && s.trim());
      produtos[i].nome = n || produtos[i].nome;
      const pnum = parseFloat(p); if(!isNaN(pnum)) produtos[i].preco = pnum;
      syncStorage(); renderCadastro();
    }

    document.getElementById('btn-add-prod').addEventListener('click', ()=>{
      const idx = parseInt(selProdAdd.value);
      const qtd = parseInt(document.getElementById('add-qtd').value) || 1;
      const precoInput = parseFloat(document.getElementById('add-preco').value);
      if(isNaN(idx) || !produtos[idx]) return alert('Selecione um produto');
      const base = produtos[idx];
      const preco = !isNaN(precoInput) ? precoInput : base.preco;
      const ex = pedido.itens.find(it => it.nome === base.nome && it.preco === preco);
      if(ex) ex.q += qtd; else pedido.itens.push({nome: base.nome, q: qtd, preco: preco});
      document.getElementById('add-qtd').value = 1;
      document.getElementById('add-preco').value = '';
      renderPedido();
    });

    window.updateQtd = function(i, v){
      const q = parseInt(v) || 1;
      pedido.itens[i].q = q;
      renderPedido();
    }

    window.updatePreco = function(i, v){
      const p = parseFloat(v) || 0;
      pedido.itens[i].preco = p;
      renderPedido();
    }

    window.remItem = function(i){
      pedido.itens.splice(i,1);
      renderPedido();
    }

    inpFrete.addEventListener('change', () => {
      pedido.frete = parseFloat(inpFrete.value) || 0;
      renderPedido();
    });

    selCliente.addEventListener('change', () => {
      pedido.cliente = selCliente.value;
    });

    function buildPedidoHTML(){
      const subtotal = pedido.itens.reduce((s,i)=> s + (i.preco * i.q), 0);
      const total = subtotal + (Number(pedido.frete) || 0);
      let rows = pedido.itens.map(it => `
        <tr>
          <td style="padding:8px;border-bottom:1px solid #eee">${it.q}</td>
          <td style="padding:8px;border-bottom:1px solid #eee">${it.nome}</td>
          <td style="padding:8px;border-bottom:1px solid #eee;text-align:right">${fmt(it.preco)}</td>
          <td style="padding:8px;border-bottom:1px solid #eee;text-align:right">${fmt(it.preco * it.q)}</td>
        </tr>
      `).join('');
      if(!rows) rows = `<tr><td colspan="4" style="padding:12px;text-align:center;color:#888">Nenhum item</td></tr>`;

      return `
        <div style="width:800px;padding:24px;background:#fff;color:#0b2038;font-family:Arial,Helvetica,sans-serif">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
            <div style="width:84px;height:84px;overflow:hidden;border-radius:12px"><img src="ouxe-logo.png" style="width:100%;height:auto" /></div>
            <div>
              <div style="font-weight:800;font-size:20px;color:#0b63d8">OUXE</div>
              <div style="color:#52647a">DISTRIBUIDOR</div>
            </div>
            <div style="margin-left:auto;text-align:right">
              <div style="font-size:12px;color:#6b7280">Data: ${pedido.data}</div>
            </div>
          </div>
          <div style="display:flex;gap:24px;margin-bottom:12px">
            <div>
              <div style="font-size:12px;color:#6b7280">Cliente</div>
              <div style="font-weight:700">${pedido.cliente || ''}</div>
            </div>
          </div>
          <table style="width:100%;border-collapse:collapse;background:#fff">
            <thead>
              <tr style="background:#f2f8ff">
                <th style="text-align:left;padding:8px;border-bottom:1px solid #dfefff">Qtd</th>
                <th style="text-align:left;padding:8px;border-bottom:1px solid #dfefff">Produto</th>
                <th style="text-align:right;padding:8px;border-bottom:1px solid #dfefff">Unit.</th>
                <th style="text-align:right;padding:8px;border-bottom:1px solid #dfefff">Total</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid #eef6ff">
            <div style="font-weight:800;font-size:14px">TOTAL DO PEDIDO</div>
            <div style="font-weight:900;color:#0b63d8;font-size:18px">${fmt(total)}</div>
          </div>
        </div>
      `;
    }

    document.getElementById('btn-gerar-img').addEventListener('click', async ()=>{
      pedido.cliente = selCliente.value;
      pedido.frete = parseFloat(inpFrete.value) || 0;
      pedido.data = new Date().toLocaleDateString('pt-BR');
      pedidoPreview.style.display = 'block';
      pedidoPreview.innerHTML = buildPedidoHTML();

      setTimeout(async ()=>{
        const canvas = await html2canvas(pedidoPreview, {scale:2, useCORS:true, backgroundColor: null});
        const imgData = canvas.toDataURL('image/png');
        pedidoPreview.innerHTML = '<img src="'+imgData+'" style="width:100%;display:block;border-radius:6px" />';
        lastImageData = imgData;
      }, 300);
    });

    let lastImageData = null;
    document.getElementById('btn-compartilhar').addEventListener('click', async ()=>{
      if(!lastImageData) return alert('Gere a imagem primeiro.');
      try{
        const blob = await (await fetch(lastImageData)).blob();
        const file = new File([blob], 'pedido-ouxe.png', {type: blob.type});
        if(navigator.canShare && navigator.canShare({files: [file]})){
          await navigator.share({files: [file], title: 'Pedido Ouxe'});
        } else {
          const a = document.createElement('a'); a.href = lastImageData; a.download = 'pedido-ouxe.png'; a.click();
        }
      }catch(e){
        const a = document.createElement('a'); a.href = lastImageData; a.download = 'pedido-ouxe.png'; a.click();
      }
    });

    document.getElementById('btn-limpar').addEventListener('click', ()=>{
      if(!confirm('Limpar pedido?')) return;
      pedido.itens = []; pedido.frete = 0; inpFrete.value = 0; renderPedido(); pedidoPreview.style.display='none'; lastImageData = null;
    });

    document.getElementById('bt-p').addEventListener('click', ()=>{
      document.getElementById('view-pedido').style.display = 'block';
      document.getElementById('view-cadastro').style.display = 'none';
    });
    document.getElementById('bt-cad').addEventListener('click', ()=>{
      document.getElementById('view-pedido').style.display = 'none';
      document.getElementById('view-cadastro').style.display = 'block';
    });

    function init(){
      const savedClientes = JSON.parse(localStorage.getItem(LS_CLIENTES));
      const savedProdutos = JSON.parse(localStorage.getItem(LS_PRODUTOS));
      if(savedClientes) clientes = savedClientes;
      if(savedProdutos) produtos = savedProdutos;
      syncStorage();
      renderCadastro();
      if(clientes.length) { pedido.cliente = clientes[0]; }
      renderPedido();
    }
    init();
  </script>
</body>
</html>
