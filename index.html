<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ouxe Distribuidor - Sistema de Pedidos</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1d4ed8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #0f172a 0%, #1e3a8a 40%, #2563eb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
      padding: 32px 24px 28px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border-radius: 18px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 32px;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
    }
    h1 { font-size: 1.45rem; color: #0f172a; margin-bottom: 6px; font-weight: 700; }
    h2 { font-size: 0.95rem; color: #64748b; font-weight: 400; margin-bottom: 24px; }
    
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-primary {
      background: #1d4ed8;
      color: #fff;
      box-shadow: 0 4px 12px rgba(29, 78, 216, 0.25);
    }
    .btn-primary:hover { background: #1e40af; transform: translateY(-2px); }
    
    .btn-install {
      background: #059669;
      color: #fff;
      box-shadow: 0 4px 12px rgba(5, 150, 105, 0.25);
      display: none;
    }
    .btn-install:hover { background: #047857; transform: translateY(-2px); }
    
    .info {
      margin-top: 18px;
      font-size: 0.8rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .info::before { content: "📦"; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">O</div>
    <h1>OUXE DISTRIBUIDOR</h1>
    <h2>Sistema de Pedidos</h2>

    <a href="https://nettosilva017-lgtm.github.io/Pedido/" class="btn btn-primary">ABRIR SISTEMA</a>
    <button id="installBtn" class="btn btn-install">INSTALAR APP</button>

    <p class="info">v1.0 • Funciona offline</p>
  </div>

  <script>
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
});

installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;

        if (choice.outcome === 'accepted') {
            installBtn.style.display = 'none';
            deferredPrompt = null;
        }
    } else {
        alert('Instalação ainda não disponível. Recarregue a página em HTTPS e tente novamente.');
    }
});

window.addEventListener('appinstalled', () => {
    installBtn.style.display = 'none';
    deferredPrompt = null;
});

if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
        try {
            await navigator.serviceWorker.register('./sw.js');
            console.log('Service Worker registrado');
        } catch (e) {
            console.error(e);
        }
    });
}
</script>
</body>
</html>
