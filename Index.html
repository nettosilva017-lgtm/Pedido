<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: #0055FF;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.app {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
  position: relative;
}
.logo-wrap {
  animation: popIn 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  opacity: 0;
  transform: scale(0.8);
}
@keyframes popIn {
  to { opacity: 1; transform: scale(1); }
}
.logo-circle {
  position: relative;
  width: 140px;
  height: 140px;
  background: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25), 0 4px 12px rgba(0, 0, 0, 0.15);
}
.logo-circle::before {
  content: '';
  position: absolute;
  inset: -14px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.6);
  animation: pulse 2s ease-out infinite;
}
.logo-circle::after {
  content: '';
  position: absolute;
  inset: -28px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.3);
  animation: pulse 2s ease-out infinite 0.4s;
}
@keyframes pulse {
  0% { transform: scale(0.85); opacity: 1; }
  100% { transform: scale(1.25); opacity: 0; }
}
.logo-circle img {
  width: 86%;
  height: 86%;
  border-radius: 50%;
  object-fit: cover;
  display: block;
}
h1 {
  font-size: clamp(26px, 6vw, 34px);
  font-weight: 800;
  letter-spacing: 1px;
  margin-top: 32px;
  line-height: 1.1;
  animation: fadeUp 0.7s ease 0.3s forwards;
  opacity: 0;
  transform: translateY(12px);
}
.subtitle {
  font-size: 17px;
  font-weight: 500;
  opacity: 0;
  margin-top: 8px;
  color: rgba(255, 255, 255, 0.92);
  letter-spacing: 0.3px;
  animation: fadeUp 0.7s ease 0.45s forwards;
  transform: translateY(12px);
}
@keyframes fadeUp {
  to { opacity: 0.95; transform: translateY(0); }
}
.buttons {
  margin-top: 64px;
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
  pointer-events: none;
}
.buttons.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.btn {
  appearance: none;
  -webkit-appearance: none;
  border: none;
  width: 100%;
  padding: 18px 28px;
  border-radius: 16px;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: 0.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
  position: relative;
  overflow: hidden;
}
.btn:active { transform: scale(0.97); }
.btn.primary {
  background: #fff;
  color: #0055FF;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.1);
}
.btn.primary:hover {
  box-shadow: 0 14px 36px rgba(0, 0, 0, 0.25);
  transform: translateY(-1px);
}
.btn.outline {
  background: rgba(255, 255, 255, 0.08);
  color: #fff;
  border: 2px solid rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.btn.outline:hover {
  background: rgba(255, 255, 255, 0.15);
  border-color: #fff;
}
.btn svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}
.footer {
  position: absolute;
  bottom: 20px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 12px;
  opacity: 0.7;
  font-weight: 500;
  letter-spacing: 0.5px;
}
@media (max-width: 380px) {
  .logo-circle { width: 120px; height: 120px; }
  .buttons { margin-top: 48px; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Show buttons after splash
  setTimeout(() => {
    document.getElementById('buttons').classList.add('show');
  }, 1500);

  // Create manifest
  const logoSrc = document.getElementById('logo-manifest').src;
  const manifestData = {
    name: "Ouxe Pedidos",
    short_name: "Ouxe Pedidos",
    description: "Sistema de Pedidos Ouxe Distribuidor",
    start_url: "./",
    scope: "./",
    display: "standalone",
    background_color: "#0055FF",
    theme_color: "#0055FF",
    orientation: "portrait-primary",
    icons: [
      { src: logoSrc, sizes: "192x192", type: "image/jpeg", purpose: "any maskable" },
      { src: logoSrc, sizes: "512x512", type: "image/jpeg", purpose: "any maskable" }
    ]
  };
  const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
  document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

  // PWA Install
  let deferredPrompt = null;
  const installBtn = document.getElementById('installBtn');
  
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.boxShadow = '0 0 0 3px rgba(255,255,255,0.3)';
  });

  installBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> INSTALADO';
        installBtn.disabled = true;
      }
      deferredPrompt = null;
    } else {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      if (isIOS) {
        alert('Para instalar no iPhone:\n\n1. Toque no ícone de compartilhar ⬆️\n2. Selecione "Adicionar à Tela de Início"\n3. Toque em "Adicionar"');
      } else {
        alert('Para instalar:\n\n• Chrome/Edge: Menu ⋮ > Instalar app\n• Já instalado? Abra pela tela inicial');
      }
    }
  });

  window.addEventListener('appinstalled', () => {
    installBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> INSTALADO';
    installBtn.disabled = true;
    deferredPrompt = null;
  });

  // Service Worker for offline
  if ('serviceWorker' in navigator) {
    try {
      const swCode = `
        const CACHE='ouxe-pwa-v1';
        self.addEventListener('install', e => { self.skipWaiting(); });
        self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
        self.addEventListener('fetch', e => {
          if (e.request.method !== 'GET') return;
          e.respondWith(
            caches.open(CACHE).then(cache => 
              cache.match(e.request).then(cached => {
                const fetchPromise = fetch(e.request).then(res => {
                  if (res && res.status === 200) cache.put(e.request, res.clone());
                  return res;
                }).catch(() => cached);
                return cached || fetchPromise;
              })
            )
          );
        });
      `;
      const swBlob = new Blob([swCode], {type: 'application/javascript'});
      const swUrl = URL.createObjectURL(swBlob);
      
      navigator.serviceWorker.register(swUrl, { scope: './' }).then(() => {
        caches.open('ouxe-pwa-v1').then(cache => {
          cache.add(window.location.href).catch(()=>{});
          cache.add(logoSrc).catch(()=>{});
        });
      }).catch(()=>{});
    } catch(e) {}
  }
});
</script>
